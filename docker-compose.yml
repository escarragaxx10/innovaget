services:

  db:
    image: postgres:15-alpine
    container_name: innovague_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}         # ✅ Desde .env, no hardcodeado
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ✅ NUEVO: Healthcheck para saber si la BD está lista antes de arrancar el backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: innovague_api
    restart: always
    ports:
      - "8000:8000"
    # ✅ Cargar variables desde archivo .env
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy  # ✅ Espera que la BD esté lista de verdad

volumes:
  postgres_data: